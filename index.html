<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đặt Cơm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 10; border-right: 2px solid #e2e8f0; }
        input[type="radio"]:disabled { cursor: not-allowed; opacity: 0.3; }
        select:disabled { cursor: not-allowed; background-color: #f3f4f6; color: #9ca3af; }
        .row-disabled { background-color: #f9fafb; color: #9ca3af; }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #3b82f6; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #3b82f6, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #3b82f6, .5em 0 0 #3b82f6; } }
        .shift-select { font-size: 11px; font-weight: bold; border: 1px solid #d1d5db; border-radius: 6px; padding: 2px; width: 100%; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        
        <div id="loginScreen" class="bg-white p-6 md:p-10 rounded-2xl shadow-2xl border-t-8 border-blue-600 text-center max-w-md mx-auto mt-10">
            <h2 class="text-3xl font-black text-blue-700 mb-2">🥗 HỆ THỐNG ĐẶT CƠM</h2>
			<h2 class="text-3xl font-black text-blue-700 mb-2">A&E</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">MÃ SỐ NHÂN VIÊN</label>
                    <input type="text" id="loginMsnv" placeholder="Ví dụ: AE001" class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-blue-500 outline-none font-bold transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">MẬT KHẨU</label>
                    <input type="password" id="loginPw" placeholder="••••••••" class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-blue-500 outline-none transition-all">
                </div>
                <button onclick="handleLogin()" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black text-lg shadow-lg transform active:scale-[0.98] transition-all">XÁC NHẬN ĐĂNG NHẬP</button>
            </div>
        </div>

        <div id="loadingOverlay" class="hidden text-center py-12 bg-white rounded-2xl shadow-xl">
            <p class="text-blue-600 font-bold text-lg loading-dots">Đang đồng bộ thực đơn & thời gian</p>
        </div>

        <div id="orderForm" class="hidden animate-fade-in bg-white p-4 md:p-8 rounded-2xl shadow-2xl border-t-8 border-green-600">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-green-50 p-4 rounded-xl border border-green-100 gap-4">
                <div class="text-center md:text-left">
                    <p class="text-xs text-green-600 font-bold uppercase">Nhân viên:</p>
                    <p class="text-xl font-black text-gray-800"><span id="displayName"></span> (<span id="displayDept"></span>)</p>
                </div>
                <div class="flex flex-col items-end">
                    <button onclick="location.reload()" class="text-xs font-bold text-red-500 mb-1">ĐĂNG XUẤT</button>
                    <p class="text-[10px] text-gray-400 italic font-medium">Chốt 15h hôm trước & 9h hôm nay</p>
                </div>
            </div>

            <input type="hidden" id="name"><input type="hidden" id="empId"><input type="hidden" id="department">

            <div class="overflow-x-auto border rounded-2xl shadow-sm mb-8">
                <table class="w-full text-[13px] text-left border-collapse">
                    <thead class="bg-green-600 text-white text-center">
                        <tr>
                            <th class="px-2 py-4 sticky-col font-bold">Thứ / Ngày</th>
                            <th class="px-1 py-4">Mặn 🍖</th>
                            <th class="px-1 py-4">Chay 🥦</th>
                            <th class="px-1 py-4">Âu 🍝</th>
                            <th class="px-2 py-4">Chọn Ca</th>
                            <th class="px-1 py-4 text-red-200">Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="menuTableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>

            <button onclick="sendData()" id="btnSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl transform active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                XÁC NHẬN ĐĂNG KÝ
            </button>
        </div>

        <div id="status" class="hidden text-center p-10 mt-4 bg-yellow-50 rounded-2xl border-2 border-dashed border-yellow-300">
            <p class="text-yellow-700 font-bold text-lg animate-pulse">Đang gửi dữ liệu chốt sổ...</p>
        </div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNNy6bysT_Rxkg8SFMTCe1LFrkyDj5UBoyvV-mhMW6hg5AUAtiYQOGUXqI8o9MAYwA/exec";
    const dayIds = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];
    const shiftOptions = `<option value="Ca 1">Ca 1</option><option value="Ca 2">Ca 2</option><option value="Ca 3">Ca 3</option><option value="Ca 4">Ca 4</option><option value="Ca 5">Ca 5</option>`;

    // Lấy danh sách ngày dựa trên logic đặt trước
    function getWeekData() {
        const now = new Date();
        const dayOfWeek = now.getDay(); 
        const diffToMon = now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
        const startOfWeek = new Date(new Date().setDate(diffToMon));

        // Nếu là T6, T7, CN -> Mặc định đặt cho tuần sau
        if (dayOfWeek >= 5 || dayOfWeek === 0) {
            startOfWeek.setDate(startOfWeek.getDate() + 7);
        }

        return dayIds.map((_, i) => {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            d.setHours(0,0,0,0);
            return {
                obj: d,
                display: d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' })
            };
        });
    }

    // Kiểm tra trạng thái Khóa của ngày
    function getLockStatus(targetDate) {
        const now = new Date();
        const today = new Date(); today.setHours(0,0,0,0);
        
        // Quá khứ: Khóa
        if (targetDate < today) return "Hết hạn";

        // Hôm nay: Khóa sau 9h sáng
        if (targetDate.getTime() === today.getTime()) {
            if (now.getHours() >= 9) return "Đang nấu";
            return false;
        }

        // Ngày mai: Khóa sau 15h hôm nay
        const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
        if (targetDate.getTime() === tomorrow.getTime()) {
            if (now.getHours() >= 15) return "Đã chốt";
        }

        return false;
    }

    function handleLogin() {
        const ms = document.getElementById('loginMsnv').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        if(!ms || !pw) return alert("Nhập đủ mã số và mật khẩu!");

        document.getElementById('btnLogin').innerText = "⏳ Đang xác thực...";
        fetch(`${WEB_APP_URL}?action=login&msnv=${ms}&pw=${pw}`)
        .then(res => res.json()).then(user => {
            if(user.success) {
                document.getElementById('name').value = user.name;
                document.getElementById('empId').value = ms;
                document.getElementById('department').value = user.dept;
                document.getElementById('displayName').innerText = user.name;
                document.getElementById('displayDept').innerText = user.dept;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('loadingOverlay').classList.remove('hidden');
                loadMenu();
            } else {
                alert("❌ Sai thông tin đăng nhập!");
                document.getElementById('btnLogin').innerText = "XÁC NHẬN ĐĂNG NHẬP";
            }
        });
    }

    function loadMenu() {
        const weekData = getWeekData();
        fetch(WEB_APP_URL).then(res => res.json()).then(menuData => {
            const tableBody = document.getElementById('menuTableBody');
            tableBody.innerHTML = ""; 
            menuData.forEach((day, index) => {
                const id = dayIds[index];
                const dateInfo = weekData[index];
                const lockMsg = getLockStatus(dateInfo.obj);
                const isDisabled = lockMsg ? "disabled" : "";

                tableBody.innerHTML += `
                    <tr class="${lockMsg ? 'row-disabled' : 'hover:bg-gray-50'} transition-colors">
                        <td class="px-2 py-4 sticky-col bg-inherit text-center">
                            <div class="font-black text-gray-700">${day.label}</div>
                            <div class="text-[10px] text-blue-600 font-bold">${dateInfo.display}</div>
                            ${lockMsg ? `<span class="text-[8px] bg-red-100 text-red-600 px-1 rounded font-bold uppercase">${lockMsg}</span>` : ''}
                        </td>
                        ${['meat','veg','west'].map((m, i) => `
                            <td class="px-1 py-4 text-center">
                                <label class="flex flex-col items-center gap-1 cursor-pointer">
                                    <input type="radio" name="${id}" value="${['Mặn','Chay','Âu'][i]}" ${isDisabled}>
                                    <span class="text-[10px] text-gray-400">${day[m] || '-'}</span>
                                </label>
                            </td>
                        `).join('')}
                        <td class="px-1 py-4">
                            <select id="shift_${id}" class="shift-select" ${isDisabled}>${shiftOptions}</select>
                        </td>
                        <td class="px-1 py-4 text-center">
                            <button type="button" onclick="clearChoice('${id}')" class="text-red-300 hover:text-red-500" ${isDisabled}>✕</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('orderForm').classList.remove('hidden');
        });
    }

    function clearChoice(id) {
        document.getElementsByName(id).forEach(r => r.checked = false);
    }

    function sendData() {
        const results = {
            name: document.getElementById('name').value,
            empId: document.getElementById('empId').value,
            department: document.getElementById('department').value,
            shift: "Xoay Ca" 
        };
        
        let count = 0;
        dayIds.forEach(id => {
            const input = document.querySelector(`input[name="${id}"]`);
            if (input.disabled) {
                results[id] = "KEEP_OLD"; // Giữ nguyên dữ liệu cũ cho ngày đã khóa
            } else {
                const selected = document.querySelector(`input[name="${id}"]:checked`);
                const shiftVal = document.getElementById(`shift_${id}`).value;
                results[id] = selected ? `${selected.value} (${shiftVal})` : "NGHỈ";
                if (selected) count++;
            }
        });

        document.getElementById('orderForm').classList.add('hidden');
        document.getElementById('status').classList.remove('hidden');

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(results)
        }).then(() => {
            alert("✅ Đã cập nhật đăng ký thành công!");
            location.reload();
        }).catch(() => {
            alert("✅ Đã ghi nhận đơn hàng!");
            location.reload();
        });
    }
</script>
</body>
</html>
